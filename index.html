<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Geral — Advocacia Escalável</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16181C;
    --surface: #1E2127;
    --surface-2: #262A32;
    --border: #333844;
    --text: #F1EFE8;
    --text-muted: #8D91A0;
    --text-faint: #5C6070;

    --comercial: #E2764C;
    --comercial-soft: rgba(226,118,76,0.12);
    --sucesso: #4B9EF0;
    --sucesso-soft: rgba(75,158,240,0.12);

    --green: #35C48C;
    --amber: #F2A93B;
    --purple: #8F7FE8;
    --teal: #2FD1C0;
    --error: #E2564C;
    --error-soft: rgba(226,86,76,0.12);

    --radius: 16px;
    --radius-sm: 10px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .display{ font-family:'Space Grotesk', 'Inter', sans-serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 72px;
  }

  /* ---------- HEADER ---------- */
  header{
    margin-bottom: 22px;
  }
  header h1{
    font-size: 23px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header p{
    margin:0;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ---------- CONFIG PANEL ---------- */
  .config{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin: 18px 0 22px;
  }
  .config-toggle{
    display:flex;
    align-items:center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .config-toggle .label{
    font-size: 13px;
    font-weight: 600;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .config-toggle .chev{
    color: var(--text-faint);
    font-size: 11px;
    transition: transform .15s;
  }
  .config.open .chev{ transform: rotate(180deg); }
  .config-body{
    display: none;
    margin-top: 16px;
    grid-template-columns: 1fr 1fr;
    gap: 12px 16px;
  }
  .config.open .config-body{ display: grid; }
  @media (max-width: 700px){ .config-body{ grid-template-columns: 1fr; } }

  .field label{
    display:block;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .field input{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .field input:focus{ border-color: var(--sucesso); }

  .config-actions{
    grid-column: 1 / -1;
    display:flex;
    align-items:center;
    gap: 10px;
    margin-top: 4px;
  }
  .config-actions button{
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .config-actions button:hover{ opacity:.85; }
  .config-actions .status{ font-size: 12px; color: var(--text-muted); }

  /* ---------- PERIOD TABS ---------- */
  .status-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 26px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .pulse-wrap{ display:flex; align-items:center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .pulse-dot{ width: 7px; height:7px; border-radius: 50%; background: var(--text-faint); position: relative; }
  .pulse-dot.live{ background: var(--green); }
  .pulse-dot.live::after{
    content:''; position:absolute; inset:-4px; border-radius:50%;
    border: 1.5px solid var(--green); opacity: .55;
    animation: pulse 2.2s ease-out infinite;
  }
  .pulse-dot.error{ background:#E2564C; }
  @keyframes pulse{ 0%{ transform:scale(0.6); opacity:.7; } 100%{ transform:scale(1.8); opacity:0; } }

  .tabs{
    display:inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .tabs button{
    background: transparent; border: none; color: var(--text-muted);
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    padding: 7px 16px; border-radius: 999px; cursor: pointer; transition: all .15s;
  }
  .tabs button.active{ background: var(--text); color: var(--bg); font-weight: 600; }

  .month-select{
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 999px;
    cursor: pointer;
    outline: none;
  }
  .month-select:focus{ border-color: var(--sucesso); }
  .month-select.active-custom{
    color: var(--text);
    border-color: var(--sucesso);
    background: var(--sucesso-soft);
  }

  .error-banner{
    background: rgba(226,86,76,0.1);
    border: 1px solid rgba(226,86,76,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 12.5px;
    color: #E2564C;
  }
  .error-banner div + div{ margin-top: 4px; }

  /* ---------- CATEGORY SECTION ---------- */
  .category{ margin-bottom: 34px; }

  .category-header{
    display:flex;
    align-items: center;
    gap: 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .category-header.comercial{ border-top: 3px solid var(--comercial); }
  .category-header.sucesso{ border-top: 3px solid var(--sucesso); }

  .category-title{ flex: 1; min-width: 180px; }
  .category-title .tag{
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 3px 9px;
    border-radius: 5px;
    display:inline-block;
    margin-bottom: 8px;
  }
  .category-header.comercial .tag{ background: var(--comercial-soft); color: var(--comercial); }
  .category-header.sucesso .tag{ background: var(--sucesso-soft); color: var(--sucesso); }
  .category-title h2{ font-size: 17px; margin: 0; font-weight: 700; }
  .category-title p{ margin: 4px 0 0; font-size: 12px; color: var(--text-muted); }

  .category-hero{
    text-align: center;
    padding: 0 18px;
  }
  .category-hero .value{
    font-family:'Space Grotesk', sans-serif;
    font-size: 44px;
    font-weight: 800;
    line-height: 1;
  }
  .category-hero.comercial .value{ color: var(--comercial); }
  .category-hero.sucesso .value{ color: var(--sucesso); }
  .category-hero .label{ font-size: 11px; color: var(--text-faint); margin-top: 4px; }

  .category-mini-stats{
    display:flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .mini-stat{ text-align: center; }
  .mini-stat .value{ font-family:'Space Grotesk', sans-serif; font-size: 19px; font-weight: 700; }
  .mini-stat .label{ font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }

  /* ---------- EMPTY / ERROR ---------- */
  .empty-state{
    text-align:center;
    padding: 50px 20px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .empty-state h3{ color: var(--text); font-size: 15px; margin: 0 0 6px; }
  .empty-state p{ font-size: 13px; margin: 0 auto; max-width: 420px; line-height: 1.5; }
  .empty-state code{
    background: var(--surface-2); padding: 2px 6px; border-radius: 4px;
    font-family:'IBM Plex Mono', monospace; font-size: 12px;
  }

  .office-error{
    font-size: 11.5px;
    color: #E2564C;
    background: rgba(226,86,76,0.1);
    border: 1px solid rgba(226,86,76,0.3);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-bottom: 12px;
  }

  footer{
    margin-top: 26px;
    font-size: 11.5px;
    color: var(--text-faint);
  }

  .skeleton{
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 37%, var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 5px;
    color: transparent !important;
  }
  @keyframes shimmer{ 0%{ background-position: 100% 50%; } 100%{ background-position: 0 50%; } }

  /* ---------- N8N ERROR CARD ---------- */
  .n8n-error-card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--error);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 18px;
  }
  .n8n-error-top{
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }
  .n8n-error-title .tag{
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 3px 9px;
    border-radius: 5px;
    display:inline-block;
    margin-bottom: 8px;
    background: var(--error-soft);
    color: var(--error);
  }
  .n8n-error-title h2{ font-size: 17px; margin: 0; font-weight: 700; }
  .n8n-error-title p{ margin: 4px 0 0; font-size: 12px; color: var(--text-muted); }

  .n8n-error-total{ text-align:center; flex-shrink:0; }
  .n8n-error-total .value{
    font-family:'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    color: var(--error);
  }
  .n8n-error-total .label{ font-size: 10.5px; color: var(--text-faint); margin-top: 4px; }

  .n8n-error-empty{ font-size: 12.5px; color: var(--text-muted); }

  .erro-lista{ display:flex; flex-direction:column; gap: 10px; }
  .erro-item{ display:flex; align-items:center; gap: 12px; }
  .erro-item .erro-nome{
    flex: 1;
    font-size: 12.5px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .erro-item .erro-barra-track{
    flex: 1.4;
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .erro-item .erro-barra-fill{
    height: 100%;
    background: var(--error);
    border-radius: 999px;
  }
  .erro-item .erro-qtd{
    width: 30px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  @media (max-width: 700px){
    .erro-item .erro-nome{ white-space: normal; flex-basis: 100%; }
    .erro-item{ flex-wrap: wrap; }
    .erro-item .erro-barra-track{ order: 3; flex-basis: 100%; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Painel Geral</h1>
    <p>Visão macro de todas as IAs · Advocacia Escalável</p>
  </header>

  <div class="status-row">
    <div class="pulse-wrap">
      <span class="pulse-dot" id="pulseDot"></span>
      <span id="statusText">Aguardando conexão</span>
    </div>
    <div class="tabs" id="periodTabs">
      <button data-period="hoje" class="active">Hoje</button>
      <button data-period="semana">Esta semana</button>
      <button data-period="mes">Este mês</button>
    </div>
    <select id="monthSelect" class="month-select">
      <option value="">Outro mês…</option>
    </select>
  </div>

  <div id="errorBanner"></div>

  <div class="n8n-error-card" id="n8nErrorCard">
    <div class="n8n-error-top">
      <div class="n8n-error-title">
        <span class="tag">OPERACIONAL</span>
        <h2>Erros n8n</h2>
        <p id="errosSubtitulo">Ocorrências por tipo de erro no mês corrente — planilha de logs, atualizada diariamente</p>
      </div>
      <div class="n8n-error-total">
        <div class="value" id="errosTotalValue">—</div>
        <div class="label">erros no mês</div>
      </div>
    </div>
    <div id="errosLista">
      <p class="n8n-error-empty">Carregando…</p>
    </div>
  </div>

  <div id="content">
    <div class="empty-state">
      <h3>Carregando dados…</h3>
      <p>Buscando o dados.json mais recente publicado pelo n8n.</p>
    </div>
  </div>

  <footer id="lastUpdated"></footer>

</div>

<script>
(function(){
  // ------------------------------------------------------------
  // Mapa fixo: qual chave do JSON de cada escritório corresponde a
  // qual agente, nome de exibição e categoria (comercial / sucesso).
  // Se um novo escritório ou uma nova IA entrar, basta adicionar aqui.
  // ------------------------------------------------------------
  const OFFICES = [
    {
      id: 'antonio_galvao', nome: 'Antonio Galvão Advogados',
      agentes: [
        { jsonKey: 'antonio', nome: 'Dr. Antonio Galvão', categoria: 'comercial' },
        { jsonKey: 'sofia',   nome: 'Sofia',               categoria: 'sucesso' },
      ]
    },
    {
      id: 'ajmm', nome: 'AJMM Advocacia',
      agentes: [
        { jsonKey: 'amina', nome: 'Amina', categoria: 'comercial' },
      ]
    },
    {
      id: 'berardini', nome: 'Berardini Sociedade de Advogados',
      agentes: [
        { jsonKey: 'julia', nome: 'Júlia', categoria: 'comercial' },
      ]
    },
    {
      id: 'andrade_alves', nome: 'Andrade Alves Advogados',
      agentes: [
        { jsonKey: 'sofia', nome: 'Sofia', categoria: 'comercial' },
      ]
    },
    {
      id: 'engel', nome: 'Engel Advogados',
      agentes: [
        { jsonKey: 'sofia', nome: 'Sofia', categoria: 'sucesso' },
        { jsonKey: 'laura', nome: 'Laura', categoria: 'comercial' },
      ]
    },
    {
      id: 'scotoni_galvao', nome: 'Scotoni e Galvão',
      agentes: [
        { jsonKey: 'sofia', nome: 'Sofia', categoria: 'comercial' },
      ]
    },
  ];

  const CATEGORIAS = {
    comercial: { titulo: 'IA Comercial', sub: 'Qualificação e conversão de leads novos' },
    sucesso:   { titulo: 'IA de Sucesso do Cliente', sub: 'Atendimento e suporte a clientes ativos' },
  };

  const DADOS_JSON_URL = 'dados.json'; // publicado pelo n8n no mesmo repositório/Pages deste painel

  let officeData = {};       // { officeId: jsonPayload | {erro} }
  let officeUrls = {};       // { officeId: url } — só usado para o filtro de mês customizado
  let currentPeriod = 'hoje';
  const mesCache = {};        // { 'yyyy-MM': { officeId: periodo_customizado } }
  let customData = {};        // dados do mês atualmente selecionado (após fetchMonth)

  const els = {
    pulseDot: document.getElementById('pulseDot'),
    statusText: document.getElementById('statusText'),
    content: document.getElementById('content'),
    errorBanner: document.getElementById('errorBanner'),
    lastUpdated: document.getElementById('lastUpdated'),
    periodTabs: document.getElementById('periodTabs'),
    monthSelect: document.getElementById('monthSelect'),
    errosTotalValue: document.getElementById('errosTotalValue'),
    errosLista: document.getElementById('errosLista'),
    errosSubtitulo: document.getElementById('errosSubtitulo'),
  };

  els.periodTabs.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    els.monthSelect.value = '';
    els.monthSelect.classList.remove('active-custom');
    currentPeriod = btn.dataset.period;
    render();
  });

  els.monthSelect.addEventListener('change', async () => {
    const mes = els.monthSelect.value;
    if (!mes) return;
    [...els.periodTabs.children].forEach(b => b.classList.remove('active'));
    els.monthSelect.classList.add('active-custom');
    currentPeriod = 'custom';
    await fetchMonth(mes);
  });

  function setStatus(kind, text){
    els.pulseDot.classList.remove('live', 'error');
    if (kind === 'live') els.pulseDot.classList.add('live');
    if (kind === 'error') els.pulseDot.classList.add('error');
    els.statusText.textContent = text;
  }

  async function loadDados(){
    setStatus('loading', 'Carregando dados.json…');
    try {
      const res = await fetch(DADOS_JSON_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      officeData = data.officeData || {};
      officeUrls = data.officeUrls || {};

      const comErro = OFFICES.filter(o => officeData[o.id] && officeData[o.id].erro);
      renderErrorBanner(comErro.map(o => ({ nome: o.nome, erro: officeData[o.id].erro })));
      populateMonthSelect();

      if (comErro.length === OFFICES.length){
        setStatus('error', 'Não foi possível carregar nenhum escritório.');
      } else if (comErro.length > 0){
        setStatus('live', `Atualizado (${comErro.length} escritório(s) com erro)`);
      } else {
        setStatus('live', 'Atualizado');
      }

      els.lastUpdated.textContent = data.atualizado_em
        ? 'Atualizado em: ' + new Date(data.atualizado_em).toLocaleString('pt-BR')
        : 'Atualizado em: ' + new Date().toLocaleString('pt-BR');

      renderErrosLogs(data.errosLogs);
      render();
    } catch(err){
      setStatus('error', 'Não foi possível carregar o dados.json: ' + err.message);
    }
  }

  function renderErrorBanner(comErro){
    if (!comErro.length){ els.errorBanner.innerHTML = ''; return; }
    els.errorBanner.innerHTML = `
      <div class="error-banner">
        ${comErro.map(r => `<div><b>${r.nome}:</b> ${r.erro}</div>`).join('')}
      </div>`;
  }

  function populateMonthSelect(){
    const set = new Set();
    Object.values(officeData).forEach(payload => {
      (payload && payload.meses_disponiveis || []).forEach(m => set.add(m));
    });
    const meses = Array.from(set).sort();
    const current = els.monthSelect.value;
    els.monthSelect.innerHTML = '<option value="">Outro mês…</option>' +
      meses.slice().reverse().map(m => `<option value="${m}">${formatMonthLabel(m)}</option>`).join('');
    els.monthSelect.value = current;
  }

  function formatMonthLabel(mes){
    const [ano, m] = mes.split('-');
    const nomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    return nomes[parseInt(m,10) - 1] + ' / ' + ano;
  }

  async function fetchMonth(mesRef){
    if (mesCache[mesRef]){
      customData = mesCache[mesRef];
      render();
      return;
    }
    const configured = OFFICES.filter(o => officeUrls[o.id]);
    setStatus('loading', 'Carregando ' + formatMonthLabel(mesRef) + '…');

    const results = await Promise.all(configured.map(async (o) => {
      const baseUrl = officeUrls[o.id];
      try {
        const url = new URL(baseUrl);
        url.searchParams.set('mes_ref', mesRef);
        const res = await fetch(url.toString(), { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.erro) throw new Error(data.erro);
        return { id: o.id, nome: o.nome, periodo: data.periodo_customizado };
      } catch(err){
        return { id: o.id, nome: o.nome, erro: err.message };
      }
    }));

    const dados = {};
    results.forEach(r => { dados[r.id] = r.erro ? { erro: r.erro } : r.periodo; });
    mesCache[mesRef] = dados;
    customData = dados;

    renderErrorBanner(results.filter(r => r.erro));
    const comErro = results.filter(r => r.erro).length;
    setStatus(comErro === results.length ? 'error' : 'live',
      comErro === results.length ? 'Não foi possível carregar nenhum escritório para este mês.' : 'Atualizado');

    render();
  }

  // ---------- Agregação ----------
  function metricsFor(office, agente){
    if (currentPeriod === 'custom'){
      const officeCustom = customData[office.id];
      if (!officeCustom || officeCustom.erro) return null;
      return officeCustom[agente.jsonKey] || null;
    }
    const payload = officeData[office.id];
    if (!payload || payload.erro) return null;
    const agenteData = payload[agente.jsonKey];
    if (!agenteData) return null;
    return agenteData[currentPeriod] || { total:0, atuou:0, emAberto:0, concluidos:0, transferidos:0, efetividade:0 };
  }

  function pct(v, t){ return t > 0 ? Math.round((v/t) * 100) : 0; }

  function buildCards(){
    const cards = [];
    OFFICES.forEach(office => {
      office.agentes.forEach(agente => {
        const m = metricsFor(office, agente);
        cards.push({
          officeId: office.id,
          officeNome: office.nome,
          agenteNome: agente.nome,
          categoria: agente.categoria,
          metrics: m,
          erro: officeData[office.id] && officeData[office.id].erro,
        });
      });
    });
    return cards;
  }

  function agregarCategoria(cards){
    const validos = cards.filter(c => c.metrics);
    const total = validos.reduce((s,c) => s + c.metrics.total, 0);
    const atuou = validos.reduce((s,c) => s + c.metrics.atuou, 0);
    const efetividade = validos.reduce((s,c) => s + c.metrics.efetividade, 0);
    const concluidos = validos.reduce((s,c) => s + c.metrics.concluidos, 0);
    const transferidos = validos.reduce((s,c) => s + c.metrics.transferidos, 0);
    const emAberto = validos.reduce((s,c) => s + c.metrics.emAberto, 0);

    // Efetividade agregada = média simples do % de cada agente (peso igual por IA,
    // não ponderado por volume de sessões). Só entram na média os agentes que tiveram
    // sessão no período — um agente com total=0 não deve contar como 0% e puxar a média.
    const comVolume = validos.filter(c => c.metrics.total > 0);
    const pctEfetividade = comVolume.length
      ? Math.round(comVolume.reduce((s,c) => s + (c.metrics.efetividade / c.metrics.total) * 100, 0) / comVolume.length)
      : 0;

    return { total, atuou, efetividade, concluidos, transferidos, emAberto, pctEfetividade };
  }

  function renderCategory(categoriaKey, cards){
    const info = CATEGORIAS[categoriaKey];
    const agregada = agregarCategoria(cards);
    return `
      <div class="category">
        <div class="category-header ${categoriaKey}">
          <div class="category-title">
            <span class="tag">${categoriaKey === 'comercial' ? 'COMERCIAL' : 'SUCESSO DO CLIENTE'}</span>
            <h2>${info.titulo}</h2>
            <p>${info.sub}</p>
          </div>
          <div class="category-hero ${categoriaKey}">
            <div class="value">${agregada.pctEfetividade}%</div>
            <div class="label">efetividade agregada</div>
          </div>
          <div class="category-mini-stats">
            <div class="mini-stat"><div class="value">${agregada.total}</div><div class="label">Sessões</div></div>
            <div class="mini-stat"><div class="value">${agregada.atuou}</div><div class="label">Atuou</div></div>
            <div class="mini-stat"><div class="value">${agregada.concluidos}</div><div class="label">Concluídos</div></div>
            <div class="mini-stat"><div class="value">${agregada.transferidos}</div><div class="label">Transferidos</div></div>
            <div class="mini-stat"><div class="value">${agregada.emAberto}</div><div class="label">Em aberto</div></div>
          </div>
        </div>
      </div>`;
  }

  function render(){
    if (Object.keys(officeData).length === 0) return;
    const cards = buildCards();
    const comercial = cards.filter(c => c.categoria === 'comercial');
    const sucesso = cards.filter(c => c.categoria === 'sucesso');
    els.content.innerHTML =
      renderCategory('comercial', comercial) +
      renderCategory('sucesso', sucesso);
  }

  // ---------- Erros n8n (ranking de tipos de erro, vindo do dados.json) ----------
  function renderErrosLogs(errosLogs){
    if (!errosLogs || !Array.isArray(errosLogs.porTipo)){
      els.errosTotalValue.textContent = '—';
      els.errosLista.innerHTML = '<p class="n8n-error-empty">Sem dados de erro disponíveis ainda.</p>';
      return;
    }

    const nomesMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    if (errosLogs.periodo){
      const [ano, mes] = errosLogs.periodo.split('-');
      els.errosSubtitulo.textContent = `Ocorrências por tipo de erro em ${nomesMes[parseInt(mes,10)-1]}/${ano} — planilha de logs, atualizada diariamente`;
    }

    els.errosTotalValue.textContent = errosLogs.total ?? 0;

    if (!errosLogs.porTipo.length){
      els.errosLista.innerHTML = '<p class="n8n-error-empty">Nenhum erro registrado no mês até agora.</p>';
      return;
    }

    const max = errosLogs.porTipo[0].quantidade || 1;
    els.errosLista.innerHTML = `
      <div class="erro-lista">
        ${errosLogs.porTipo.map(item => `
          <div class="erro-item">
            <div class="erro-nome" title="${item.erro.replace(/"/g,'&quot;')}">${item.erro}</div>
            <div class="erro-barra-track"><div class="erro-barra-fill" style="width:${(item.quantidade/max*100).toFixed(1)}%"></div></div>
            <div class="erro-qtd">${item.quantidade}</div>
          </div>
        `).join('')}
      </div>`;
  }

  // ---------- Init ----------
  loadDados();
})();
</script>
